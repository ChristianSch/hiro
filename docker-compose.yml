services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    ports:
      - "51432:5432"
    environment:
      POSTGRES_DB: hiro
      POSTGRES_USER: hiro
      POSTGRES_PASSWORD: hiro
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiro -d hiro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
