syntax = "proto3";

package search;

option go_package = "./adapters/search/grpc";

message SearchRequest {
  string query = 1;
  int32 page_number = 2;
  int32 result_per_page = 3;
}

message SearchResponse {
  message Result {
    string url = 1;
    string title = 2;
    string content = 3;
    string description = 4;
  }
  repeated Result results = 1;
}

enum OperationalState {
  OPERATIONAL_STATE_UNKNOWN = 0;
  OPERATIONAL_STATE_OPERATIONAL = 1;
  OPERATIONAL_STATE_UNAVAILABLE = 2;
}

message StatusRequest {}

message DependencyStatus {
  string name = 1;
  OperationalState state = 2;
}

message StatusResponse {
  OperationalState state = 1;
  repeated DependencyStatus dependencies = 2;
}

service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}
