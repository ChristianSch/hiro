syntax = "proto3";

package embed;

option go_package = "./adapters/embed/grpc";

message EmbeddingRequest {
    string url = 1;
    string title = 2;
    string content = 3;
    string description = 4;
}

message EmbeddingResponse {
    bool success = 1;
}

message QueryEmbeddingRequest {
    string query = 1;
}

message QueryEmbeddingResponse {
    repeated float embedding = 1;
}

message EmbeddingStatusRequest {}

message EmbeddingStatusResponse {
    bool ready = 1;
    string model = 2;
}

service EmbeddingService {
    // Chunks, embeds, and stores a crawled document.
    rpc Embed (EmbeddingRequest) returns (EmbeddingResponse) {}
    // Embeds a search query with the same model used for documents.
    rpc EmbedQuery (QueryEmbeddingRequest) returns (QueryEmbeddingResponse) {}
    // Reports whether model inference is ready.
    rpc Status (EmbeddingStatusRequest) returns (EmbeddingStatusResponse) {}
}